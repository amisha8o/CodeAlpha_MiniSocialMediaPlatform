<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Social Media</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9eaef; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .profile-header { text-align: center; border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 15px; }
        textarea { width: 100%; height: 60px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; resize: none; }
        button { background-color: #1877f2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #166fe5; }
        .post { border: 1px solid #e4e6eb; padding: 15px; margin-top: 15px; border-radius: 8px; background-color: #fcfcfd; }
        .like-btn { background-color: #e4e6eb; color: #050505; margin-top: 10px; padding: 6px 12px; }
        .like-btn:hover { background-color: #d8dadf; }
    </style>
</head>
<body>

<div class="container">
    <div class="card profile-header">
        <h2>👤 Intern2026</h2>
        <p style="color: gray; margin-top: -10px;">Full Stack Web Developer @ CodeAlpha</p>
    </div>

    <div class="card">
        <h3>Create Post</h3>
        <textarea id="postContent" placeholder="What's on your mind?"></textarea>
        <button onclick="createPost()">Publish Post</button>
    </div>

    <div class="card">
        <h3>News Feed</h3>
        <div id="feed"></div>
    </div>
</div>

<script>
    const currentUser = 'Intern2026';

    // Fetch and display posts from the backend
    async function loadPosts() {
        const res = await fetch('/api/posts');
        const posts = await res.json();
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        
        posts.forEach(post => {
            feed.innerHTML += `
                <div class="post">
                    <strong style="color: #1877f2;">${post.author}</strong>
                    <p>${post.content}</p>
                    <button class="like-btn" onclick="likePost(${post.id})">👍 Like (${post.likes})</button>
                </div>
            `;
        });
    }

    // Send a new post to the backend
    async function createPost() {
        const content = document.getElementById('postContent').value;
        if (!content) return alert("You can't publish an empty post!");

        await fetch('/api/posts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ author: currentUser, content })
        });
        
        document.getElementById('postContent').value = '';
        loadPosts(); // Refresh the feed
    }

    // Send a like to the backend
    async function likePost(id) {
        await fetch(`/api/posts/${id}/like`, { method: 'POST' });
        loadPosts(); // Refresh the feed to show new like count
    }

    // Load posts immediately when the page opens
    loadPosts();
</script>

</body>
</html>
